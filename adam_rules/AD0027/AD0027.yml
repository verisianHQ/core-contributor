# Variable: FASFN
# Condition: FASFN is present
# Rule: FASFN is present and has a value that is not 1 or 0
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        Version: '1.3'
        References:
          - Origin: ADaM Conformance Rules
            Rule Identifier:
              Id: '27'
              Version: '1'
            Version: '5.0'
            Citations:
              - Document: IG v1.3
                Section: 3.2.3
                Item: '1'
                Cited Guidance:
                  'ADaMIG v1.3, Section 3.2, Table 3.2.3: The values of subject-level population flags cannot be blank. If a flag is used, the corresponding numeric version (*FN, where 0=No and 1=Yes) of the population flag can also be included.'
      - Name: ADaMIG
        Version: '1.2'
        References:
          - Origin: ADaM Conformance Rules
            Rule Identifier:
              Id: '27'
              Version: '1'
            Version: '5.0'
            Citations:
              - Document: IG v1.2
                Section: 3.2.3
                Item: '1'
                Cited Guidance:
                  'ADaMIG v1.2, Section 3.2, Table 3.2.3: The values of subject-level population flags cannot be blank. If a flag is used, the corresponding numeric version (*FN, where 0=No and 1=Yes) of the population flag can also be included.'
      - Name: ADaMIG
        Version: '1.1'
        References:
          - Origin: ADaM Conformance Rules
            Rule Identifier:
              Id: '27'
              Version: '1'
            Version: '5.0'
            Citations:
              - Document: IG v1.1
                Section: 3.2.3
                Item: '1'
                Cited Guidance:
                  'ADaMIG v1.1, Section 3.2, Table 3.2.3: The values of subject-level population flags cannot be blank. If a flag is used, the corresponding numeric version (*FN, where 0=no and 1=yes) of the population flag can also be included.'
      - Name: ADaMIG
        Version: '1.0'
        References:
          - Origin: ADaM Conformance Rules
            Rule Identifier:
              Id: '27'
              Version: '1'
            Version: '5.0'
            Citations:
              - Document: IG v1.0
                Section: 3.1.1
                Item: '1'
                Cited Guidance:
                  'ADaMIG v1.0, Section 3.1, Table 3.1.1: The values of subject-level population flags cannot be blank. If a flag is used, the corresponding numeric version (*FN) can also be included.'
Check:
  all:
    - name: FASFN
      operator: exists
    - name: FASFN
      operator: not_equal_to
      value: 1
      value_is_literal: true
    - name: FASFN
      operator: not_equal_to
      value: 0
      value_is_literal: true
Core:
  Id: AD0027
  Status: Published
  Version: '1'
Description: Raise an error when the Population Flag variable (FASFN) is present and has a value that is not 1 or 0.
Executability: Fully Executable
Outcome:
  Message: FASFN has a value that is not 1 or 0.
  Output Variables:
    - FASFN
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ADSL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
