name: Update Submodule and Sync PR Branches

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Submodule branch to track'
        required: true
        default: 'main'

jobs:
  sync-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT }}

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Update Submodule on Main
        run: |
          git checkout main
          git submodule update --init --remote engine
          
          if git diff --quiet engine; then
            echo "Main is already up to date with the latest engine."
          else
            git add engine
            git commit -m "chore: update engine submodule to latest"
            git push origin main
          fi

      - name: Sync PR Branches
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          PR_BRANCHES=$(gh pr list --base main --json headRefName --jq '.[].headRefName')

          for branch in $PR_BRANCHES; do
            echo "Processing branch: $branch"
            git checkout $branch
            
            if ! git diff --quiet main..$branch -- engine; then
              echo "!!! Submodule change detected in $branch. !!!"
              echo "Reverting..."
              
              git checkout main -- engine
              git add engine
              git commit -m "fix: revert unauthorized submodule changes to match main"
            fi

            if git merge main -m "chore: sync with main and update engine"; then
              git push origin $branch
              echo "Successfully sanitised and updated $branch"
            else
              echo "Merge conflict in $branch. Skipping..."
              git merge --abort
            fi
          done
