name: Assign CORE ID on Merge

on:
  pull_request:
    types: [closed]
    paths:
      - 'rules/NEW-RULE/**'
      - 'adam_rules/NEW-RULE/**'
    branches: [main]

jobs:
  assign-new-rule-id:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}
          token: ${{ secrets.ADMIN_PAT }}
          
      - name: Check if NEW-RULE directory exists
        id: check-dir
        run: |
          if [ -d "rules/NEW-RULE" ]; then
            echo "rules_dir=rules" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
          elif [ -d "adam_rules/NEW-RULE" ]; then
            echo "rules_dir=adam_rules" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "rules_dir=" >> $GITHUB_OUTPUT
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.12
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Calculate next ID and rename files
        id: rename_step
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          cat << 'EOF' > rename_script.py
          import os
          import re

          rules_dir = os.environ.get('rules_dir', 'rules')
          new_rule_dir = os.path.join(rules_dir, 'NEW-RULE')

          if not os.path.exists(new_rule_dir):
              exit(0)

          def get_conformance_ids(yaml_path):
              unique_ids = []
              in_rule_id_block = False
              with open(yaml_path, 'r', encoding='utf-8') as f:
                  for line in f:
                      stripped = line.strip()
                      if stripped.startswith('Rule Identifier:'):
                          in_rule_id_block = True
                      elif in_rule_id_block and stripped.startswith('Id:'):
                          val = stripped.split('Id:', 1)[1].strip().strip('\'\"')
                          if val and val not in unique_ids:
                              unique_ids.append(val)
                          in_rule_id_block = False
              return unique_ids

          yaml_file_path = None
          for root, dirs, files in os.walk(new_rule_dir):
              for file in files:
                  if file.endswith(('.yml', '.yaml')):
                      yaml_file_path = os.path.join(root, file)
                      break
              if yaml_file_path:
                  break

          if not yaml_file_path:
              print("No YAML file found in NEW-RULE directory.")
              exit(1)

          unique_ids = get_conformance_ids(yaml_file_path)

          if rules_dir == 'rules':
              existing_ids = []
              for d in os.listdir(rules_dir):
                  match = re.match(r'CORE-(\d+)', d)
                  if match:
                      num = int(match.group(1))
                      if num >= 2000:
                          existing_ids.append(num)
              existing_ids.sort()
              next_id = 2000
              for num in existing_ids:
                  if num == next_id:
                      next_id += 1
                  elif num > next_id:
                      break
              new_core_id = f'CORE-{next_id:06d}'
          elif rules_dir == 'adam_rules':
              if not unique_ids:
                  print("No conformance IDs found for ADaM rule.")
                  exit(1)
              new_core_id = unique_ids[0]
          else:
              exit(1)

          print(f'Assigning new ID: {new_core_id}')

          if 'GITHUB_OUTPUT' in os.environ:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"NEW_CORE_ID={new_core_id}\n")
          
          if 'GITHUB_ENV' in os.environ:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"NEW_CORE_ID={new_core_id}\n")

          target_dir = os.path.join(rules_dir, new_core_id)
          os.rename(new_rule_dir, target_dir)

          for root, dirs, files in os.walk(target_dir):
              for file in files:
                  old_path = os.path.join(root, file)
                  
                  if file.endswith(('.yml', '.yaml')):
                      updated_lines = []
                      in_core_block = False
                      
                      with open(old_path, 'r', encoding='utf-8') as f:
                          lines = f.readlines()

                      for line in lines:
                          stripped = line.strip()
                          
                          if stripped == 'Core:':
                              in_core_block = True
                          elif in_core_block and stripped.startswith('Id:'):
                              indent = len(line) - len(line.lstrip())
                              line = f"{' '*indent}Id: {new_core_id}\n"
                          elif in_core_block and stripped.startswith('Status:'):
                              indent = len(line) - len(line.lstrip())
                              line = f"{' '*indent}Status: Published\n"
                              in_core_block = False

                          updated_lines.append(line)

                      if rules_dir == 'rules':
                          new_name = f"{new_core_id},{','.join(unique_ids)}.yml" if unique_ids else file.replace('NEW-RULE', new_core_id)
                      elif rules_dir == 'adam_rules':
                          new_name = f"{new_core_id}.yml"
                          
                      new_path = os.path.join(root, new_name)
                      
                      with open(new_path, 'w', encoding='utf-8') as f:
                          f.writelines(updated_lines)
                      
                      if old_path != new_path:
                          os.remove(old_path)

                  else:
                      new_name = file.replace('new-rule', new_core_id).replace('NEW-RULE', new_core_id)
                      new_path = os.path.join(root, new_name)
                      if old_path != new_path:
                          os.rename(old_path, new_path)
          EOF
          
          python rename_script.py
        env:
          rules_dir: ${{ steps.check-dir.outputs.rules_dir }}

      - name: Commit and Push Changes
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add rules/ adam_rules/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "bot-chore: assign ${{ steps.rename_step.outputs.NEW_CORE_ID }} to merged NEW-RULE"
            git push origin ${{ github.base_ref }}
          fi
