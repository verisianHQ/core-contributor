name: Validate Rule Contributions

on:
  pull_request:
    paths:
      - 'rules/**'
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Setup Virtual Environment
        run: python -m venv venv

      - name: Initialize engine submodule and Install Dependencies
        run: |
          VENV_PYTHON=$(pwd)/venv/bin/python
          VENV_PIP=$(pwd)/venv/bin/pip
          
          $VENV_PYTHON -m pip install --upgrade pip
          
          git submodule update --init --recursive
          
          cd engine
          $VENV_PIP install -r requirements.txt
          $VENV_PIP install -r requirements-dev.txt
          
          SUBMODULE_COMMIT=$(git rev-parse HEAD)
          echo "Using engine submodule at commit: $SUBMODULE_COMMIT"
          cd ..

      - name: Detect changed rules
        id: changed-rules
        run: |
          # Get list of changed rule directories
          CHANGED_RULES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^rules/(CORE-|NEW-RULE)' | cut -d'/' -f2 | sort -u)
          
          if [ -z "$CHANGED_RULES" ]; then
            echo "No rule changes detected"
            echo "rules=" >> $GITHUB_OUTPUT
          else
            echo "Changed rules: $CHANGED_RULES"
            # Convert to JSON array
            RULES_JSON=$(echo "$CHANGED_RULES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "rules=$RULES_JSON" >> $GITHUB_OUTPUT
          fi

      - name: Validate changed rules
        if: steps.changed-rules.outputs.rules != ''
        id: validate
        continue-on-error: true
        run: |
          PYTHON_CMD="./venv/bin/python"
          RULES='${{ steps.changed-rules.outputs.rules }}'
          
          REPORT_FILE="validation_report.md"
          echo "# Rule Validation Report" > $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          OVERALL_SUCCESS=true
          
          while read -r RULE_ID; do
            echo "Validating $RULE_ID"
            echo "## Rule: $RULE_ID" >> $REPORT_FILE
            echo "" >> $REPORT_FILE

            if [ ! -d "rules/$RULE_ID" ]; then
              echo "**ERROR:** Directory rules/$RULE_ID not found" >> $REPORT_FILE
              OVERALL_SUCCESS=false
              continue
            fi
            
            # Backup committed results
            echo ""
            echo "Backing up committed results..."
            for TEST_TYPE in positive negative; do
              TEST_PATH="rules/$RULE_ID/$TEST_TYPE"
              if [ -d "$TEST_PATH" ]; then
                for CASE_DIR in "$TEST_PATH"/*; do
                  if [ -d "$CASE_DIR" ] && [ -f "$CASE_DIR/results/results.json" ]; then
                    cp "$CASE_DIR/results/results.json" "$CASE_DIR/results/results.json.committed"
                    echo "  Backed up: $CASE_DIR/results/results.json"
                  fi
                done
              fi
            done
            
            echo ""
            echo "Generating fresh results..."
            $PYTHON_CMD -c "from test import generate_rule_results; generate_rule_results('$RULE_ID')" || {
              echo "**ERROR:** Failed to generate results" >> $REPORT_FILE
              OVERALL_SUCCESS=false
              continue
            }
            
            RULE_PASSED=true
            CASE_COUNT=0
            PASSED_COUNT=0
            FAILED_COUNT=0
            
            for TEST_TYPE in positive negative; do
              TEST_PATH="rules/$RULE_ID/$TEST_TYPE"
              
              if [ ! -d "$TEST_PATH" ]; then
                echo "  (No $TEST_TYPE cases found in $TEST_PATH)"
                continue
              fi
              
              for CASE_DIR in "$TEST_PATH"/*; do
                if [ ! -d "$CASE_DIR" ]; then continue; fi
                
                CASE_ID=$(basename "$CASE_DIR")
                COMMITTED_RESULTS="$CASE_DIR/results/results.json.committed"
                GENERATED_RESULTS="$CASE_DIR/results/results.json"
                CASE_COUNT=$((CASE_COUNT + 1))
                
                TEMP_OUTPUT="/tmp/validator_${TEST_TYPE}_${CASE_ID}.txt"
                
                if ! diff -q <(jq --sort-keys . "$COMMITTED_RESULTS") <(jq --sort-keys . "$GENERATED_RESULTS") > /dev/null 2>&1; then
                  echo "Results differ for $TEST_TYPE/$CASE_ID, showing diff:" > "$TEMP_OUTPUT"
                  diff <(jq --sort-keys . "$COMMITTED_RESULTS") <(jq --sort-keys . "$GENERATED_RESULTS") >> "$TEMP_OUTPUT" || true
                  echo "\`$TEST_TYPE/$CASE_ID\`: ❌ Validation failed" >> $REPORT_FILE
                  RULE_PASSED=false
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                  OVERALL_SUCCESS=false
                else
                  echo "Results match for $TEST_TYPE/$CASE_ID" > "$TEMP_OUTPUT"
                  echo "\`$TEST_TYPE/$CASE_ID\`: ✅ Passed" >> $REPORT_FILE
                  PASSED_COUNT=$((PASSED_COUNT + 1))
                fi
                
                echo "<details><summary>View details</summary>" >> $REPORT_FILE
                echo "" >> $REPORT_FILE
                echo '```diff' >> $REPORT_FILE
                cat "$TEMP_OUTPUT" >> $REPORT_FILE
                echo "" >> $REPORT_FILE
                echo '```' >> $REPORT_FILE
                echo "</details>" >> $REPORT_FILE
                echo "" >> $REPORT_FILE
              done
            done
            
            echo "**Summary:** $PASSED_COUNT passed, $FAILED_COUNT failed (Total: $CASE_COUNT test cases)" >> $REPORT_FILE
            echo "---" >> $REPORT_FILE
            
          done <<< "$(echo "$RULES" | jq -r '.[]')"
          
          if [ "$OVERALL_SUCCESS" = false ]; then
            exit 1
          fi

      - name: Post validation report
        if: always() && steps.changed-rules.outputs.rules != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'validation_report.md';
            
            let detailedContent = 'No validation report generated.';
            if (fs.existsSync(reportPath)) {
              detailedContent = fs.readFileSync(reportPath, 'utf8');
            }
            
            const newReportBody = `## Rule Validation Results (Run ${context.runId})\n\n<details>\n<summary><strong>Click to expand full report</strong></summary>\n\n${detailedContent}\n</details>\n\n---\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
            
            // Find existing comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComments = comments.filter(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('## Rule Validation Results') || comment.body.includes('Previous validation run superseded'))
            );
            
            // Shrink down all older comments
            for (const comment of botComments) {
              if (comment.body.includes('<details>')) {
                let shrinkText = `_Previous validation run superseded. [View latest run](${context.payload.repository.html_url}/actions/runs/${context.runId})_\n\n`;
                
                // Keep the old Run ID in the summary title
                const titleMatch = comment.body.match(/## Rule Validation Results \(Run \d+\)/);
                if (titleMatch) {
                  shrinkText += `**${titleMatch[0].replace('## ', '')}**\n`;
                } else {
                  shrinkText += `**Previous Validation Results**\n`;
                }
                
                // Extract rules and their summaries by splitting on the header format generated in the bash step
                const parts = comment.body.split('## Rule: ');
                for (let i = 1; i < parts.length; i++) {
                  const lines = parts[i].split('\n');
                  const ruleName = lines[0].trim();
                  
                  const summaryLine = lines.find(line => line.startsWith('**Summary:**'));
                  const errorLine = lines.find(line => line.startsWith('**ERROR:**')); // Fallback if a rule errored out entirely
                  
                  if (summaryLine) {
                    const cleanSummary = summaryLine.replace('**Summary:**', '').trim();
                    shrinkText += `- **${ruleName}**: ${cleanSummary}\n`;
                  } else if (errorLine) {
                    const cleanError = errorLine.replace('**ERROR:**', '').trim();
                    shrinkText += `- **${ruleName}**: ❌ ${cleanError}\n`;
                  } else {
                    shrinkText += `- **${ruleName}**: Failed to complete validation\n`;
                  }
                }
                
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                  body: shrinkText
                });
              }
            }
            
            // Post the new report comment at the bottom
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: newReportBody
            });

      - name: Check validation status
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Validation failed - see report in PR comments"
          exit 1