name: Auto Review Rule Formatting

on:
  pull_request:
    paths:
      - 'rules/**'
    types: [opened, synchronize, reopened]

jobs:
  validate-format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests pyyaml jsonschema

      - name: Detect changed rules
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^rules/.*\.ya?ml$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No YAML files changed in rules directory."
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "files=$(echo $CHANGED_FILES | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Validate Rule Formatting
        if: steps.changed-files.outputs.files != ''
        run: |
          cat << 'EOF' > validate_schema.py
          import sys
          import os
          import json
          import requests
          import yaml
          from jsonschema import Draft202012Validator
          from collections import defaultdict

          SCHEMA_URL = "https://rule-editor.cdisc.org/api/schema"

          try:
              response = requests.get(SCHEMA_URL, timeout=10)
              response.raise_for_status()
              schema = response.json()
              validator = Draft202012Validator(schema)
          except Exception as e:
              print(f"Failed to fetch or parse schema: {e}")
              sys.exit(1)

          changed_files = sys.argv[1].split()
          file_line_errors = defaultdict(list)

          def get_line_number(filepath, error_path):
              if not error_path:
                  return 1
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      lines = f.readlines()
                  current_line = 0
                  for step_idx, path_element in enumerate(error_path):
                      found = False
                      if isinstance(path_element, str):
                          search_key = f"{path_element}:"
                          if current_line < len(lines) and search_key in lines[current_line].strip():
                              found = True
                          else:
                              while current_line < len(lines):
                                  stripped = lines[current_line].strip()
                                  if stripped.startswith(search_key) or f"- {search_key}" in stripped:
                                      found = True
                                      break
                                  current_line += 1
                      elif isinstance(path_element, int):
                          if step_idx > 0 and isinstance(error_path[step_idx-1], str):
                              current_line += 1
                          list_idx = 0
                          while current_line < len(lines):
                              stripped = lines[current_line].strip()
                              if stripped.startswith('-'):
                                  if list_idx == path_element:
                                      found = True
                                      break
                                  list_idx += 1
                              current_line += 1
                      if not found:
                          break
                  if current_line >= len(lines):
                      current_line = len(lines) - 1
                  return current_line + 1
              except Exception:
                  return 1

          for filepath in changed_files:
              if not os.path.exists(filepath):
                  continue

              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      rule_data = yaml.safe_load(f)
              except yaml.YAMLError as exc:
                  file_line_errors[(filepath, 1)].append(("YAML Parsing Error", f"```\n{exc}\n```"))
                  continue

              if rule_data is None:
                  file_line_errors[(filepath, 1)].append(("Validation Error", "File is empty or contains invalid YAML structure."))
                  continue

              for error in validator.iter_errors(rule_data):
                  if error.validator == 'pattern' and 'id' in error.path:
                      continue

                  path_str = " -> ".join([str(p) for p in error.path]) if error.path else "Root Document"
                  line_num = get_line_number(filepath, error.path)
                  file_line_errors[(filepath, line_num)].append((path_str, error.message))

          comments = []
          for (filepath, line_num), errors in file_line_errors.items():
              if len(errors) == 1:
                  title, msg = errors[0]
                  if title in ("YAML Parsing Error", "Validation Error"):
                      body = f"**{title}:**\n{msg}"
                  else:
                      body = f"**Schema Error at `{title}`:** {msg}"
              else:
                  body = f"<details><summary>**Multiple Schema Errors ({len(errors)})**</summary>\n\n"
                  for title, msg in errors:
                      body += f"- **`{title}`**: {msg}\n"
                  body += "</details>"
              
              body += "\n"
              comments.append({
                  "path": filepath,
                  "line": line_num,
                  "body": body
              })

          with open('pr_comments.json', 'w') as f:
              json.dump(comments, f, indent=2)
          EOF

          python validate_schema.py "${{ steps.changed-files.outputs.files }}"

      - name: Post PR Comments
        if: steps.changed-files.outputs.files != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('pr_comments.json')) return;
            
            const comments = JSON.parse(fs.readFileSync('pr_comments.json', 'utf8'));
            if (comments.length === 0) {
              console.log("All rule formats passed validation against the schema!");
              return;
            }

            const { data: existingReviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const botReviewComments = existingReviewComments.filter(comment => 
              comment.body.includes('')
            );

            for (const comment of botReviewComments) {
              await github.rest.pulls.deleteReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

            const { data: existingIssueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const botIssueComments = existingIssueComments.filter(comment => 
              comment.body.includes('')
            );

            for (const comment of botIssueComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

            for (const comment of comments) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  commit_id: context.payload.pull_request.head.sha,
                  path: comment.path,
                  line: comment.line,
                  body: comment.body
                });
              } catch (error) {
                console.log(`Could not post inline comment on ${comment.path} line ${comment.line}. Falling back to general PR comment.`);
                const fallbackBody = `**Schema Error in \`${comment.path}\` (Line ${comment.line}):**\n\n${comment.body}`;
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: fallbackBody
                });
              }
            }

            core.setFailed("Schema validation failed. Please check the PR comments and correct the issues.");