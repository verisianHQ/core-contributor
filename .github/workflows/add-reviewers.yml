name: Add Reviewers

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Add Reviewers
      uses: actions/github-script@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        reviewers: verisianHQ/core-verisian,eljanssens
        re-request-when-approved: true
        re-request-when-changes-requested: true
