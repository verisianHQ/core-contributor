name: Add Reviewers

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  statuses: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Add Reviewers
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const targetReviewer = 'pendingintent';
          const prAuthor = context.payload.pull_request.user.login;
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const pull_number = context.issue.number;

          if (prAuthor === targetReviewer) {
            console.log(`Author is ${targetReviewer}. Skipping self-assignment.`);
            return;
          }

          let hasAdamRules = false;
          let page = 1;
          
          while (true) {
            const files = await github.rest.pulls.listFiles({
              owner: owner,
              repo: repo,
              pull_number: pull_number,
              per_page: 100,
              page: page
            });
            
            if (files.data.length === 0) break;
            
            if (files.data.some(f => f.filename.startsWith('adam_rules/'))) {
              hasAdamRules = true;
              break;
            }
            
            if (files.data.length < 100) break;
            page++;
          }

          if (hasAdamRules) {
            console.log("Changed files include 'adam_rules/'. Skipping reviewer assignment.");
            return;
          }

          console.log(`Assigning ${targetReviewer} to PR #${pull_number}`);

          await github.rest.pulls.requestReviewers({
            owner: owner,
            repo: repo,
            pull_number: pull_number,
            reviewers: [targetReviewer],
          });
