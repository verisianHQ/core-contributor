# Variable: TSVAL
# Condition: TSPARMCD = 'FDATCHSP'
# Rule: TSVAL matches a value of the CDISC Controlled Terminology FDATSRS codelist (C160926).
# verified
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1104
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1104
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1104
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: FDATCHSP
      value_is_literal: true
    - name: TSVAL
      operator: is_not_contained_by
      value: $codelist_guides
Core:
  Id: CORE-002051
  Status: Published
  Version: '1'
Description: Raise an error when value for Trial Summary Parameter 'FDA Tech Spec' (TSPARMCD = 'FDATCHSP') does not match a value as listed on the study data standards resources website for technical specification documents (CDISC Controlled Terminology FDATSRS codelist (C160926)).
Executability: Fully Executable
Operations:
  - id: $codelist_guides
    operator: get_codelist_attributes
    ct_attribute: Term Signification
    ct_conditions:
      - Codelist Code: C160926
Outcome:
  Message: TSVAL does not match a value as listed on the study data standards resources website for technical specification documents (CDISC Controlled Terminology FDATSRS codelist (C160926)).
  Output Variables:
    - TSPARMCD
    - TSVAL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record