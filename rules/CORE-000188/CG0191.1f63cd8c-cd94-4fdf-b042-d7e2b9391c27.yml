# Variable: GEN
# Condition: MS dataset present in study
# Rule: MB dataset present in study
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        Version: '3.4'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0191
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: The domain pair uses DOMAIN as an Identifier to group
                  parent records (e.g., MB) from child records (e.g., MS) and enables
                  a dataset-level relationship to be described in RELREC.
                Document: IG v3.4
                Item: Item 1, bullet 5
                Section: '2.6'
              - Cited Guidance: MS is used for representing data from drug susceptibility
                  testing on the organisms identified in MB.
                Document: IG v3.4
                Section: 6.3.5.4
      - Name: SDTMIG
        Version: '3.2'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0191
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: 'The domain pair uses DOMAIN
                  as an Identifier to group parent records (e.g., MB) from child records
                  (e.g., MS) and enables a dataset-level relationship to be described
                  in RELREC.'
                Document: IG v3.2
                Item: Item 1, Bullet 5
                Section: '2.6'
              - Cited Guidance: 'Definition: The MS domain is designed to store any findings related to the organisms found and submitted
                  in MB.'
                Document: IG v3.2
                Item: MS Assumption 1
                Section: '6.3'
      - Name: SDTMIG
        Version: '3.3'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0191
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: The domain pair uses DOMAIN as an Identifier
                  to group parent records (e.g., MB) from child records (e.g., MS)
                  and enables a dataset-level relationship to be described in RELREC.
                Document: IG v3.3
                Item: Item 1
                Section: '2.6'
              - Cited Guidance: MS is used for representing data from drug susceptibility testing on
                  the organisms identified in MB.
                Document: IG v3.3
                Item: Bullet 5
                Section: '6.3.7'
Check:
  all:
    - name: MS
      operator: exists
    - name: MB
      operator: not_exists
Core:
  Id: CORE-000188
  Status: Published
  Version: '1'
Description: Raise an error when the MS dataset is present but the MB dataset is not present.
Executability: Fully Executable
Outcome:
  Message: The MB dataset must be present when the MS dataset is present.
  Output Variables:
    - MS
    - MB
Rule Type: Domain Presence Check
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - MS
Sensitivity: Dataset
