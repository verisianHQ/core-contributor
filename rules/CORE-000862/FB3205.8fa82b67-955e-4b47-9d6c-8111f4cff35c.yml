Check:
  all:
    - name: --STDY
      operator: exists
    - name: --STDTC
      operator: not_exists
Core:
  Id: CORE-000862
  Status: Published
  Version: '1'
Description: Raise an error when --STDY is present and populated but --STDTC is
  not present in the dataset.
Executability: Fully Executable
Outcome:
  Message: --STDTC must be included in the dataset when --STDY is present and
    populated.
  Output Variables:
    - --STDTC
    - --STDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - FINDINGS ABOUT
      - SPECIAL PURPOSE
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
