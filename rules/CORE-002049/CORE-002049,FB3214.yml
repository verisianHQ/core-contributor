      value: BESTDY
Core:
  Id: CORE-002049
  Status: Published
  Version: '1'
Description: Raise an error when Study Day of Specimen Collection (BEDY) is greater than Study Day of Start of Biospecimen Event (BESTDY).
Executability: Fully Executable
Outcome:
  Message: BEDY is greater than BESTDY.
  Output Variables:
    - BESTDY
    - BEDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - BE
Sensitivity: Record