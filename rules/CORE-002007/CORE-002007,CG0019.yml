Check:
  all:
    - name: define_key_sequence_is_unique
      operator: equal_to
      value: false
Core:
  Id: CORE-002007
  Status: Published
  Version: '1'
Description: Raise an error when records are not unique as per sponsor defined key variables described in the define-xml document.
Executability: Fully Executable
Outcome:
  Message: Based on the key variables defined in the define-xml document, duplicate records are present in the dataset.
  Output Variables:
    - define_dataset_key_sequence
    - define_key_sequence_is_unique
Rule Type: Dataset Contents Check against Define XML
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record