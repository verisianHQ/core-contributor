# Variable: GEN
# Condition: 
# Rule: Each record is unique per sponsor defined key variables as documented in the define.xml
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Note that the key variables shown in this table are examples only. A sponsor's actual key structure may be different.
                Document: IG v3.4
                Section: Table 3.2.1
              - Cited Guidance: Since the purpose of this column is to aid reviewers in understanding the structure of a dataset, sponsors should list all of the natural keys (see definition below) for the dataset. These keys should define uniqueness for records within a dataset, and may define a record sort order. The identified keys for each dataset should be consistent with the description of the dataset structure as described in the Define-XML document.]
                Document: IG v3.4
                Section: 3.2.1.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0019
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Note that the key variables shown in this table are examples only. A sponsor's actual key structure may be different.
                Document: IG v3.3
                Section: Table 3.2.1
              - Cited Guidance: Since the purpose of this column is to aid reviewers in understanding the structure of a dataset, sponsors should list all of the natural keys (see definition below) for the dataset. These keys should define uniqueness for records within a dataset, and may define a record sort order.
                Document: IG v3.3
                Section: 3.2.1.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0019
              Version: '1'
