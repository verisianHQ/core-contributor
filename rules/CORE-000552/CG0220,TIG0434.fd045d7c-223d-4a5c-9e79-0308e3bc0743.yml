Check:
  all:
    - name: --STDTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --STDY
      operator: not_equal_to
      value: $val_stdy
Core:
  Id: CORE-000552
  Status: Published
  Version: '1'
Description: Raise an error when the Study Day of Start of Observation 
  (--STDY) is not correctly calculated as per the study day algorithm 
  as a non-zero integer value when the date portion of --STDTC is complete
  and the date portion of RFSTDTC is a complete date.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Operations:
  - id: $val_stdy
    name: --STDTC
    operator: dy
Outcome:
  Message: --STDY is not calculated correctly even though the date portion 
    of --STDTC is complete and the date portion of RFSTDTC is complete.
  Output Variables:
    - --STDY
    - --STDTC
    - $val_stdy
    - RFSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Exclude:
      - DM
  Use Case: INDH
Sensitivity: Record
