# Variable: --BODSYS
# Condition: Primary SOC used for analysis
# Rule: --BODSYS = --SOC
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        Version: '3.4'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0039
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: 'IG v3.4[6.2.1][Specification][Dictionary derived. Body system or organ class 
                 used by the sponsor from the coding dictionary (e.g., MedDRA). When using a multi-axial dictionary 
                 such as MedDRA, this should contain the SOC used for the sponsors analyses and summary tables which 
                 may not necessarily be the primary SOC.]|Model v2.0[Events][--BODSYS][Body system or system organ class 
                 assigned for analysis from a standard hierarchy (e.g. MedDRA) associated with an event.]'
                Document: IG v3.4|Model v2.0
                Item: SSpecification|--BODSYS
                Section: 6.2.1|Events
      - Name: SDTMIG
        Version: '3.3'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0039
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: 'IG v3.3[6.2.1][Specification][Dictionary derived. Body system or organ class used by the sponsor 
                   from the coding dictionary (e.g., MedDRA). When using a multi-axial dictionary such as MedDRA, this 
                   should contain the SOC used for the sponsors analyses and summary tables which may not necessarily be the primary 
                   SOC.]|Model v1.7[2.2.2][Table 2.2.2.1: --BODSYS][Model: Body system or system organ class assigned for analysis from 
                   a standard hierarchy (e.g. MedDRA) associated with an event.]'
                Document: IG v3.3|Model v1.7
                Item: 'IG v3.3[6.2.1][Specification]|Model v1.7[2.2.2][Table 2.2.2.1: --BODSYS]'
                Section: IG v3.3[6.2.1]|Model v1.7[2.2.2]
      - Name: SDTMIG
        Version: '3.2'
        References:
          - Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0039
              Version: '1'
            Version: '2.0'
            Citations:
              - Cited Guidance: 'IG v3.2[6.2 AE][Specification][Dictionary derived. Body system or organ class used by the sponsor 
                    from the coding dictionary (e.g., MedDRA). When using a multi-axial dictionary such as MedDRA, this 
                    should contain the SOC used for the sponsors analyses and summary tables which may not necessarily be the primary 
                    SOC.]|Model v1.4[2.2.2][Table 2.2.2: --BODSYS][Model: Body system or system organ class assigned for analysis from 
                    a standard hierarchy (e.g. MedDRA) associated with an event.]'
                Document: IG v3.2|Model v1.4
                Item: 'IG v3.2[6.2 AE][Specification]|Model v1.4[2.2.2][Table 2.2.2: --BODSYS]'
                Section: IG v3.2[6.2 AE]|Model v1.4[2.2.2]
Check:
  all:
    - name: --SOC
      operator: exists
    - any:
      - name: --BODSYS
        operator: not_exists
      - name: --BODSYS
        operator: not_equal_to
        value: --SOC
Core:
  Id: CORE-000264
  Status: Published
  Version: '1'
Description: Raise an error when primary SOC is used for analysis but --BODSYS is missing
  or is not equal to --SOC.
Executability: Partially Executable - Possible Overreporting
Outcome:
  Message: --BODSYS must be equal to --SOC when primary SOC is used for analysis.
  Output Variables:
    - --TERM
    - --DECOD
    - --BODSYS
    - --SOC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Exclude:
      - DS
      - DV
      - HO
Sensitivity: Record
