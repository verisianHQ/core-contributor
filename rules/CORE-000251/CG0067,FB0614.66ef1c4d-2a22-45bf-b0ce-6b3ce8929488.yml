Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: true
    - name: $ds_dsdecod
      operator: does_not_contain
      value: DEATH
      value_is_literal: true
Core:
  Id: CORE-000251
  Status: Published
  Version: '1'
Description: Raise an error when SSSTRESC is equal to 'DEAD' in the SS dataset, but DSDECOD is not equal to 'DEATH' in the DS dataset.
Executability: Fully Executable
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $ds_dsdecod
    name: DSDECOD
    operator: distinct
Outcome:
  Message: DSDECOD must be equal to 'DEATH' in the DS dataset when SSSTRESC is equal to 'DEAD' in the SS dataset.
  Output Variables:
    - SSSTRESC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - SS
Sensitivity: Record
