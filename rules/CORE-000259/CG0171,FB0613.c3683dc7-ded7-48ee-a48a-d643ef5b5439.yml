Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: true
    - name: SSDTC
      operator: date_less_than
      value: DTHDTC
Core:
  Id: CORE-000259
  Status: Published
  Version: '1'
Description: Raise an error when SSDTC in the SS dataset, where SSSTRESC is equal
  to 'DEAD', is not on or after DTHDTC in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: SSDTC in the SS dataset, where SSSTRESC is equal to 'DEAD', is not 
    on or after DTHDTC in the DM dataset.
  Output Variables:
    - SSSTRESC
    - SSDTC
    - DTHDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - SS
Sensitivity: Record
