Check:
  all:
    - name: --STRESU
      operator: is_inconsistent_across_dataset
      value:
        - --TESTCD
        - --CAT
        - --SCAT
        - --SPEC
        - --METHOD
        - --STAT
Core:
  Id: CORE-000699
  Status: Published
  Version: '1'
Description: Raise an error when standard units (--STRESU) is not consistent within the same assessment
  (having the same --TESTCD, --CAT, --SCAT, --SPEC, --METHOD values).
Executability: Fully Executable
Outcome:
  Message: Standards unit (--STRESU) is not consistent within the same assessment ( --TESTCD, --CAT, --SCAT, --SPEC, --METHOD).
  Output Variables:
    - --STRESU
    - --TESTCD
    - --CAT
    - --SCAT
    - --SPEC
    - --METHOD
    - --STAT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - FINDINGS ABOUT
  Domains:
    Include:
      - ALL
Sensitivity: Group
Grouping_Variables:
  - --TESTCD
  - --CAT
  - --SCAT
  - --SPEC
  - --METHOD