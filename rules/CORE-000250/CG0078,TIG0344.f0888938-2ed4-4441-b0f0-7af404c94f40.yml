Check:
  all:
    - name: MHENDTC
      operator: non_empty
    - name: MHENDTC
      operator: date_greater_than_or_equal_to
      value: RFSTDTC
Core:
  Id: CORE-000250
  Status: Published
  Version: '1'
Description: Raise an error when MHENDTC is populated and the date is equal to
  or after RFSTDTC in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: MHENDTC is populated but falls on or after RFSTDTC in the DM dataset. 
  Output Variables:
    - MHENDTC
    - RFSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - MH
  Use Case: INDH
Sensitivity: Record
