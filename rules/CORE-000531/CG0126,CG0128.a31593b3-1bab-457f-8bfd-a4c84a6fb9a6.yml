# Variable: ARMCD
# Condition: ARMCD not in ('SCRNFAIL', 'NOTASSGN')
# Rule: ARMCD in TA.ARMCD
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Data for screen failure subjects, if submitted, should be
                  included in the Demographics dataset, with ARMCD = "SCRNFAIL'
                  and ARM = "Screen Failure". Subjects withdrawn from a trial
                  before assignment to an Arm, if they are not screen failures,
                  should have ARMCD ='NOTASSGN' and ARM = 'Not Assigned'.
                Document: IG v3.2
                Item: Assumption 4
                Section: '5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0126
              Version: '1'
            Version: '2.0'
          - Citations:
              - Cited Guidance: Data for screen failure subjects, if submitted, should be
                  included in the Demographics dataset, with ARMCD = "SCRNFAIL'
                  and ARM = "Screen Failure". Subjects withdrawn from a trial
                  before assignment to an Arm, if they are not screen failures,
                  should have ARMCD ='NOTASSGN' and ARM = 'Not Assigned'.
                Document: IG v3.2
                Item: Assumption 4
                Section: '5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0128
              Version: '1'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: ARMCD
      operator: is_not_contained_by
      value:
        - SCRNFAIL
        - NOTASSGN
    - name: ARMCD
      operator: is_not_contained_by
      value: $armcd_list
Core:
  Id: CORE-000531
  Status: Published
  Version: '1'
Description: Raise an error when ARMCD value in the DM dataset does not 
  match any of the ARMCD values in the TA dataset.
Executability: Fully Executable
Operations:
  - domain: TA
    id: $armcd_list
    name: ARMCD
    operator: distinct
Outcome:
  Message: ARMCD in the DM dataset must equal 'SCRNFAIL' or 'NOTASSGN' if the value 
    does not exist in any ARMCD in the TA dataset.
  Output Variables:
    - ARMCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
