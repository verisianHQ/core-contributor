      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Reference value for the result or finding copied or derived from
                  --ORREF in a standard format.
                Document: Model v1.7
                Item: --STREFC
                Section: Table 2.2.3
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0549
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: Reference value for the result or finding copied or derived from
                  --ORREF in a standard format.
                Document: SDTM v2.1
                Item: --STREFC
                Section: 3.1.3 The Findings Observation Class
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0637
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - any:
        - name: --ORREF
          operator: non_empty
        - name: --DRVFL
          operator: equal_to
          value: Y
          value_is_literal: true
    - any:
        - name: --STREFC
          operator: not_exists
        - name: --STREFC
          operator: empty
Core:
  Id: CORE-000110
  Status: Published
  Version: '1'
Description: Raise an error when --STREFC is not populated and either --ORREF is populated or --DRVFL is equal to 'Y'.
Executability: Fully Executable
Outcome:
  Message: --STREFC is not populated when --ORREF is populated or --DRVFL is equal to 'Y'.
  Output Variables:
    - --TESTCD
    - --TEST
    - --ORREF
    - --DRVFL
    - --STREFC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
  Use Case: INDH, PROD
Sensitivity: Record
