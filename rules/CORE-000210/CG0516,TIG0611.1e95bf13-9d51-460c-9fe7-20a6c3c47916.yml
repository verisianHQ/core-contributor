# Variable: ARMCD
# Condition: Study does not use multi-stage arm assignments and ARMCD ^= null
# Rule: ARMCD in TA.ARMCD
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage Arm
                  assignments, must be a value of ARMCD in the Trial Arms
                  Dataset.  If the subject was not assigned to an Arm, ARMCD is
                  null and ARMNRS is populated
                Document: IG v3.4
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0516
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage arm
                  assignments, must be a value of ARMCD in the Trial Arms
                  Dataset. If the subject was not assigned to an arm or followed
                  a course not described by any planned arm, ACTARMCD is null
                  and ARMNRS is populated.
                Document: IG v3.3
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0516
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage Arm
                  assignments, must be a value of ARMCD in the Trial Arms
                  Dataset.  If the subject was not assigned to an Arm, ARMCD is
                  null and ARMNRS is populated
                Document: TIG 1.0
                Item: Specification:ARMCD
                Section: 2.8.10.4
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0611
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: ARMCD
      operator: non_empty
    - name: ARMCD
      operator: is_not_contained_by
      value: $ta_armcd
Core:
  Id: CORE-000210
  Status: Published
  Version: '1'
Description: Raise an error when ARMCD value in DM dataset does not match any ARMCD value in TA dataset.
Executability: Partially Executable - Possible Overreporting
Operations:
  - domain: TA
    id: $ta_armcd
    name: ARMCD
    operator: distinct
Outcome:
  Message: ARMCD value in DM dataset does not match any ARMCD value in TA dataset. This is only acceptable for multi-stage studies with incomplete ARM assignments.
  Output Variables:
    - ARMCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
  Use Case: INDH
Sensitivity: Record
