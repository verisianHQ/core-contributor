Check:
  all:
    - name: SVUPDES
      operator: non_empty
    - name: VISITNUM
      operator: is_contained_by
      value: $visitnum_in_tv
Core:
  Id: CORE-000843
  Status: Published
  Version: '1'
Description: Raise and error when SVUPDES is populated but the VISITNUM
  value matches a VISITNUM value in the TV dataset.
Executability: Fully Executable
Operations:
  - domain: TV
    id: $visitnum_in_tv
    name: VISITNUM
    operator: distinct
Outcome:
  Message: SVUPDES is populated but the VISITNUM value matches a VISITNUM
    value present in the TV dataset.
  Output Variables:
    - SVUPDES
    - VISITNUM
    - VISIT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - SV
Sensitivity: Record
