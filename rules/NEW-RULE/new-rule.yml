Check:
  all:
    - name: --ENDTC
      operator: non_empty
    - any:
      - name: --ENDTC
        operator: date_less_than
        value: RFXSTDTC
      - name: --ENDTC
        operator: date_greater_than
        value: RFXENDTC
Core:
  Id: ''
  Status: Draft
  Version: '1'
Description: Raise an error when treatment exposure end date/time (--ENDTC) falls outside first (RFXSTDTC) and last (RFXENDTC) study treatment date/time in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: --ENDTC does not fall on or between RFXSTDTC and RFXENDTC.
  Output Variables:
    - --ENDTC 
    - RFXSTDTC
    - RFXENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EC
      - EX
Sensitivity: Record
