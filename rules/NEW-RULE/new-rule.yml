Core:
  Id: CDISC.SDTMIG.CG0173
  Status: Draft
  Version: '1'
Description: Raise an error when collected data fits a Qualifier variable listed
  in specified SDTM Sections and are represented in the Findings About domain,
  and the name of the variable is used as FATEST
Executability: Fully Executable
Operations:
  - id: $fatest_roles
    operator: label_referenced_variable_metadata
    name: FATEST
    attribute_name: role
Outcome:
  Message: Collected data does not fit a Qualifier variable listed in specified SDTM
    Sections and are represented in the Findings About domain, and the name of
    the variable is used as FATESTCD
  Output Variables:
    - FATEST
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS ABOUT
  Domains:
    Include:
      - FA
Sensitivity: Record
