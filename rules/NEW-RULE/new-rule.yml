# Variable: GEN
# Condition: Variable Core Status = Permissible and data is collected
# Rule: Variable present in dataset
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: If a study includes a data item that would be represented in a Permissible variable, then that variable must be included in the SDTM dataset, even if null. Indicate no data were available for that variable in the Define-XML document.
                Document: IG v3.3
                Section: '2.5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0651
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: If a study includes a data item that would be represented in a Permissible variable, then that variable must be included in the SDTM dataset, even if null. Indicate no data were available for that variable in the Define-XML document.
                Document: IG v3.4
                Section: '2.5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0651
              Version: '1'
            Version: '2.0'
        Version: '3.4'
Check:
  all:
    - name: define_variable_name
      operator: is_not_null
    - name: library_variable_core
      operator: equal_to
      value: Perm
    - name: define_variable_has_no_data
      operator: is_null
    - name: variable_name
      operator: is_null
Core:
  Id: CDISC.SDTMIG.CG0651
  Status: Published
  Version: '1'
Description: Raise an error when a variable is permissible, data is collected as per define-xml document but variable is not present in the dataset.
Executability: Fully Executable
Outcome:
  Message: Variable is permissible and data is collected as per define-xml document but variable is not present in the dataset.
  Output Variables:
    - define_variable_name
    - define_variable_has_no_data
    - library_variable_core
    - variable_name
Rule Type: Variable Metadata Check against Define XML and Library Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record