Check:
  any:
    - name: variable_size
      operator: not_equal_to
      value: $max_data_length
    - name: $global_max_size
      operator: not_equal_to
      value: $global_min_size
    - name: variable_size
      operator: not_equal_to
      value: $global_max_size
    - name: variable_size
      operator: not_equal_to
      value: $global_min_size
Core:
  Id: FDA.SDTMIG.FB1801
  Status: Draft
  Version: '1'
Description: The length of each variable cannot be different between datasets
  and should not be longer than the maximum length of the data contained by the
  variable.
Executability: Fully Executable
Operations:
  - id: $max_data_length
    domain: global_value_check
    name: variable_value_length
    operator: max
    group:
      - dataset_name
      - variable_name
  - id: $global_max_size
    domain: global_value_check
    name: variable_size
    operator: max
    group:
      - variable_name
  - id: $global_min_size
    domain: global_value_check
    name: variable_size
    operator: min
    group:
      - variable_name
Outcome:
  Message: Variable length is different between datasets and/or is longer than the maximum length of the actual data contained by the variable.
  Output Variables:
    - dataset_name
    - variable_name
    - variable_size
    - variable_value_length
    - $max_data_length
    - $global_min_size
    - $global_max_size
Rule Type: Global Value Check with Variable Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Exclude:
      - SUPP--
Sensitivity: Study
