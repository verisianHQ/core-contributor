      operator: non_empty
    - name: --DTC
      operator: empty
Core:
  Id: ''
  Status: Draft
  Version: '1'
Description: Raise an error when end date/time of observation (--ENDTC) is populated and related date/time of collection (--DTC) is not populated.
Executability: Fully Executable
Outcome:
  Message: --ENDTC is populated, but --DTC is not populated.
