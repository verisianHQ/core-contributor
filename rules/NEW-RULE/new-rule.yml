Check:
  all:
    - name: variable_length
      operator: greater_than
      value: $max_variable_value_length
Core:
  Id: FDA.SDTMIG.FB1901
  Status: Draft
  Version: '1'
Description: Raise an error when variable length is longer than the maximum length of the actual data contained by the variable.
Executability: Fully Executable
Operations:
  - id: $max_variable_value_length
    name: variable_value_length
    operator: max
    group:
      - variable_name
    use_rule_type_table: true
Outcome:
  Message: Variable length is longer than the maximum length of the actual data contained by the variable.
  Output Variables:
    - variable_name
    - $max_variable_value_length
    - variable_length
Rule Type: Value Check with Variable Metadata
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - SUPP--
      - RELREC
Sensitivity: Group
Grouping_Variables:
  - variable_name
