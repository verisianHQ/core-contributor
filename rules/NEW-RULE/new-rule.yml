Check:
  all:
    - name: $ts_tsparmcd
      operator: does_not_contain
      value: SSTDTC
      value_is_literal: true
Core:
  Id: FDA.TRC1734b
  Status: Draft
  Version: '1'
Description: FDA desired parameter Study Start Date (SSTDTC) should be present
  in the TS domain.
Executability: Fully Executable
Operations:
  - domain: TS
    group:
      - STUDYID
    id: $ts_tsparmcd
    name: TSPARMCD
    operator: distinct
Outcome:
  Message: Missing TSPARMCD = SSTDTC record in TS dataset.
  Output Variables:
    - STUDYID
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Group
Grouping_Variables:
  - STUDYID