# Variable: GEN
# Condition: Variable Core Status = Permissible and data is collected
# Rule: Variable present in dataset and ^= null
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The sponsor does not have the discretion to exclude permissible
                  variables when they contain data.
                Document: IG v3.2
                Section: 4.1.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The sponsor does not have the discretion to exclude permissible
                  variables when they contain data.
                Document: IG v3.3
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: If a study includes a data item that would be represented in a
                  Permissible variable, then that variable must be included in
                  the SDTM dataset, even if null.
                Document: IG v3.4
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.4'
Check:
    all:
    - name: variable_name
      operator: is_contained_by
      value: $permissible_variables
    - name: define_variable_is_collected
      operator: equal_to
      value: "true"
      value_is_literal: true
    - any:
      - name: variable_has_empty_values
        operator: equal_to
        value: "True"
        value_is_literal: true
      - name: define_variable_has_no_data
        operator: equal_to
        value: "true"
        value_is_literal: true
Core:
  Id: CDISC.SDTMIG.CG0015
  Status: Draft
  Version: '1'
Description: Raise an error when a variable is permissible, data is collected
  but variable has no data.
Executability: Fully Executable
Operations:
  - id: $permissible_variables
    operator: permissible_variables
Outcome:
  Message: 'Variable is permissible, data is collected but data is missing.'
  Output Variables:
    - variable_name
    - $permissible_variables
    - define_variable_is_collected
    - variable_has_empty_values
    - define_variable_has_no_data
Rule Type: Variable Metadata Check against Define XML and Library Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record