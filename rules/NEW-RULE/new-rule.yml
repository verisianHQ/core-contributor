Check:
  all:
    - name: define_variable_is_collected
      operator: equal_to
      value: true
    - name: define_variable_name
      operator: non_empty
    - name: library_variable_role
      operator: equal_to
      value: Timing
    - name: define_variable_has_no_data
      operator: empty
    - any:
        - name: variable_name
          operator: empty
        - name: variable_is_empty
          operator: equal_to
          value: true
Core:
  Id: FDA.SDTMIG.FB3801
  Status: Draft
  Version: '1'
Description: Raise an error when a timing variable has data collected as per define-xml document but variable is not present in the dataset or has no data.
Executability: Fully Executable
Outcome:
  Message: Timing variable has data collected as per Define-XML document but variable is not present in the dataset or variable has no data.
  Output Variables:
    - define_variable_name
    - define_variable_has_no_data
    - define_variable_is_collected
    - library_variable_role
    - variable_name
    - variable_is_empty
Rule Type: Variable Metadata Check against Define XML and Library Metadata
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
