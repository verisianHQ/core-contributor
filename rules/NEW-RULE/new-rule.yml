Check:
  all:
    - name: CMTRT
      operator: non_empty
    - name: CMTRT
      operator: is_valid_whodrug_term_reference
      case_insensitive: true
    - name: CMDECOD
      operator: empty
Core:
  Id: CDISC.SDTMIG.CG0096
  Status: Draft
  Version: '1'
Description: Raise an error when CMTRT is populated with a valid WHODrug term, but CMDECOD is empty.
Executability: Fully Executable
Outcome:
  Message: CMDECOD must be populated when CMTRT is populated with a valid WHODrug term.
  Output Variables:
    - CMTRT
    - CMDECOD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - CM
Sensitivity: Record