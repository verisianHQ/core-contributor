Check:
  all:
    - any:
      - name: define_variable_name
        operator: equal_to
        value: RACE
      - name: define_variable_name
        operator: equal_to
        value: CRACE
    - name: define_variable_codelist_coded_values
      operator: not_equal_to
      value: 'AMERICAN INDIAN OR ALASKA NATIVE,ASIAN,BLACK OR AFRICAN AMERICAN,NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER,WHITE'
      value_is_literal: true
Core:
  Id: FDA.SDTMIG.FB5901
  Status: Draft
  Version: '1'
Description: Raise an error when race is collected but 'AMERICAN INDIAN OR ALASKA NATIVE', 'ASIAN', 'BLACK OR AFRICAN AMERICAN', 'NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER', and 'WHITE' are not offered options.
Executability: Fully Executable
Outcome:
  Message: Race is collected, but one or more of the following race options are not offered - AMERICAN INDIAN OR ALASKA NATIVE, ASIAN, BLACK OR AFRICAN AMERICAN, NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER, or WHITE.
  Output Variables:
    - define_variable_name
    - define_variable_codelist_coded_values
Rule Type: Define Item Metadata Check
Scope:
  Classes:
    Include:
      - RELATIONSHIP
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
      - SUPPDM
Sensitivity: Record
