Check:
  all:
    - name: --TPT
      operator: exists
    - name: --TPTNUM
      operator: exists
    - any:
        - name: --TPT
          operator: is_not_unique_relationship
          value: --TPTNUM
        - name: --TPTNUM
          operator: is_not_unique_relationship
          value: --TPT
Core:
  Id: ''
  Status: Draft
  Version: '1'
Description: Raise an error when TPT and TPTNUM are present, but
  TPT and TPTNUM do not have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: --TPT and --TPTNUM do not have a one-to-one relationship.
  Output Variables:
    - --TPT
    - --TPTNUM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
