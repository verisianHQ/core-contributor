Check:
  all:
    - name: CRACE
      operator: equal_to_case_insensitive
      value: Haitian
    - any:
      - all:
        - name: RACE
          operator: not_equal_to
          value: BLACK OR AFRICAN AMERICAN
          value_is_literal: true
        - name: RACE
          operator: not_equal_to
          value: MULTIPLE
      - all:
        - name: RACE
          operator: equal_to
          value: MULTIPLE
          value_is_literal: true
        - name: RACE
          operator: not_in_enumerated_columns
          value: BLACK OR AFRICAN AMERICAN
          value_is_literal: true
          regex: ^RACE
Core:
  Id: FB6001
  Status: Draft
  Version: '1'
Description: Raise an error when Race Term 'Haitian' (SUPPDM.CRACE) is collected and is not mapped to Race (RACE) 'BLACK OR AFRICAN AMERICAN' in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: SUPPDM
Outcome:
  Message: Race 'Haitian' is collected (CRACE) but is not mapped as RACE = 'BLACK OR AFRICAN AMERICAN' in the DM dataset.
  Output Variables:
    - CRACE
    - RACE
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record