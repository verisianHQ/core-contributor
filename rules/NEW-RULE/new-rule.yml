# Variable: TSPARMCD
# Condition: record exists where TSPARMCD = 'STYPE' and TSVAL = 'INTERVENTIONAL'
# Rule: TSPARMCD = 'PCLAS' is present
# verified
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1110
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1110
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1110
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: $STYPE_INTERVENTIONAL
      operator: greater_than_or_equal_to
      value: 1
    - name: $TS_TSPARMCD_VALUES
      operator: does_not_contain
      value: PCLAS
      value_is_literal: true
Core:
  Id: FDA.SDTMIG.FB1110
  Status: Draft
  Version: '1'
Description: Raise an error when FDA Conditionally Desired Trial Summary (TS) Parameter for Pharmalogical Class (TSPARMCD = 'PCLAS') is not present in the TS dataset when Study Type (TSPARMCD = 'STYPE') is interventional.
Executability: Fully Executable
Operations:
  - filter:
      TSPARMCD: STYPE
      TSVAL: INTERVENTIONAL
    id: $STYPE_INTERVENTIONAL
    operator: record_count
  - filter:
      TSPARMCD: PCLAS
    id: $TSPARMCD_PCLAS
    operator: record_count
  - domain: TS
    id: $TS_TSPARMCD_VALUES
    name: TSPARMCD
    operator: distinct
Outcome:
  Message: FDA Conditional Desired TSPARMCD = 'PCLAS' is missing in the TS dataset when TSPARMCD = 'STYPE' and TSVAL = 'INTERVENTIONAL'.
  Output Variables:
    - $STYPE_INTERVENTIONAL
    - $TSPARMCD_PCLAS
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Dataset