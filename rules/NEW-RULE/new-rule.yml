Check:
  all:
    - name: PCTEST
      operator: equal_to
      value: PPCAT
    - name: PCSPEC
      operator: not_equal_to
      value: PPSPEC
Core:
  Id: FDA.SDTMIG.FB7101
  Status: Draft
  Version: '1'
Description: Raise an error when for the same drug or metabolite (PCTEST = PCCAT), specimen type (--SPEC) is not consistent across pharmacokinetic datasets within a submission. 
Executability: Partially Executable
Match Datasets:
  - Name: PP
    Keys:
      - USUBJID
Outcome:
  Message: PCSPEC is not equal to PPSPEC for the same drug or metabolite (PCTEST = PPCAT).
  Output Variables:
    - PCTEST
    - PPCAT
    - PCSPEC
    - PPSPEC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - PC
Sensitivity: Group
Grouping_Variables:
  - PCTEST
  - PCSPEC
  - PPSPEC
