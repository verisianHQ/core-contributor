Check:
  all:
    - name: variable_value_length
      operator: greater_than
      value: variable_size
Core:
  Id: FDA.SDTMIG.FB1901
  Status: Draft
  Version: '1'
Description: All values in each variable in each of the SUPPQUAL and RELREC datasets is shorter or equal to that variable's length.
Executability: Fully Executable
Outcome:
  Message: Variable length is longer than the maximum length of the actual data contained by the variable.
  Output Variables:
    - variable_name
    - variable_value
    - variable_size
    - variable_value_length
Rule Type: Value Check with Variable Metadata
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - SUPP--
      - RELREC
Sensitivity: Record
