Check:
  any:
    - name: file_tag_name
      operator: not_contains_all
      value: 
        - "data-tabulation-dataset-sdtm"
    - name: file_tag_name
      operator: not_contains_all
      value: 
        - "data-tabulation-data-definition"
Core:
  Id: TRC1375a
  Status: Draft
  Version: '1'
Description: Raise an error when the STF file tag 'data-tabulation-dataset-sdtm'and/or 'data-tabulation-data-definition' is not present.
Executability: Fully Executable
Outcome:
  Message: Missing 'data-tabulation-dataset-sdtm' and/or 'data-tabulation-data-definition' STF file tag.
  Output Variables:
    - study_id
Rule Type: STF Metadata Check
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Study
