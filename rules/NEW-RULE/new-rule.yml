Core:
  Id: FDA.SDTMIG.FB3212
  Status: Draft
  Version: '1'
Description: Raise an error when Date/Time of Specimen Collection (BEDTC) is after
  Start Date/Time of Biospecimen Event (BESTDTC).
Executability: Fully Executable
Outcome:
  Message: BEDTC falls after BESTDTC.
  Output Variables:
    - BESTDTC
    - BEDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - BE
Sensitivity: Record