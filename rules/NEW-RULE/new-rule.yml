Check:
  any:
    - name: dataset_name
      operator: equal_to
      value: $domain_label
    - any:
      - name: variable_length
        operator: not_equal_to
        value: $max_variable_value_length
      - name: $global_max_variable_length
        operator: not_equal_to
        value: $global_min_variable_length
      - name: variable_length
        operator: not_equal_to
        value: $global_max_variable_length
      - name: variable_length
        operator: not_equal_to
        value: $global_min_variable_length
Core:
  Id: FDA.SDTMIG.FB1801
  Status: Draft
  Version: '1'
Description: Raise an error when the variable length is not equal between datasets and/or is longer than the maximum length of the actual data contained by the variable.
Executability: Fully Executable
Operations:
  - id: $max_variable_value_length
    domain: global_value_check
    name: variable_value_length
    operator: max
    group:
      - variable_name
  - id: $global_max_variable_length
    domain: global_value_check
    name: variable_length
    operator: max
    group:
      - variable_name
  - id: $global_min_variable_length
    domain: global_value_check
    name: variable_length
    operator: min
    group:
      - variable_name
  - id: $domain_label
    name: domain_label
    operator: domain_label
Outcome:
  Message: Variable length is different between datasets and/or is longer than the maximum length of the actual data contained by the variable.
  Output Variables:
    - dataset_name
    - variable_name
    - variable_length
    - variable_value_length
    - $max_variable_value_length
    - $global_min_variable_length
    - $global_max_variable_length
Rule Type: Global Value Check with Variable Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Exclude:
      - SUPP--
Sensitivity: Group
Grouping_Variables:
  - variable_name
