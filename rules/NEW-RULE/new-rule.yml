Check:
  all:
    - name: --STDY
      operator: non_empty
    - name: --DY
      operator: non_empty
    - name: --STDY
      operator: greater_than
      value: --DY
Core:
  Id: FDA.SDTMIG.FB3213
  Status: Draft
  Version: '1'
Description: Raise an error when Study Day of Start of Observation (--STDY) is greater than Study Day of Visit/Collection/Exam (--DY).
Executability: Fully Executable
Outcome:
  Message: --STDY is greater than --DY.
  Output Variables:
    - --STDY
    - --DY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
  Domains:
    Exclude:
      - BE
Sensitivity: Record