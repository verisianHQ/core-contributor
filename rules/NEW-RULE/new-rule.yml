# Variable: --STDTC, RFPENDTC
# Condition: --STDTC ^= Null and DM.RFPENDTC ^= Null
# Rule: --STDTC <= DM.RFPENDTC
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3405
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3405
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3405
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: --STDTC
      operator: non_empty
    - name: RFPENDTC
      operator: non_empty
    - name: --STDTC
      operator: date_greater_than
      value: RFPENDTC
Core:
  Id: FB3405
  Status: Draft
  Version: '1'
Description: Raise an error when Start Date/Time (--STDTC) is after Date/Time of End of Participation (RFPENDTC).
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: --STDTC falls after RFPENDTC.
  Output Variables:
    - --STDTC
    - RFPENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - SPECIAL PURPOSE
  Domains:
    Exclude:
        - DM
Sensitivity: Record
