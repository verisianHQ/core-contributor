Check:
  any:
    # Scenario 1: It's an SDTIGVER parameter, but fails one of the two checks
    - all:
        - name: TSPARMCD
          operator: equal_to
          value: SDTIGVER
          value_is_literal: true
        - any:
            - name: TSVAL
              operator: is_not_contained_by
              value: $SDTMIGRS
            - name: TSVAL
              operator: is_not_contained_by
              value: $fda_standards
    
    # Scenario 2: It's an SDTMVER parameter, but fails one of the two checks
    - all:
        - name: TSPARMCD
          operator: equal_to
          value: SDTMVER
          value_is_literal: true
        - any:
            - name: TSVAL
              operator: is_not_contained_by
              value: $SDTMVRS
            - name: TSVAL
              operator: is_not_contained_by
              value: $fda_standards
Core:
  Id: FDA.SDTMIG.FB1105
  Status: Draft
  Version: '1'
Description: Raise an error if SDTM IG Version or SDTM Version do not match a value in the CDISC Controlled Terminology or do not exist in the FDA Data Standards Catalog.
Executability: Fully Executable
Operations:
  - id: $SDTMVRS
    operator: get_codelist_attributes
    ct_attribute: Term Signification
    ct_conditions:
      - Codelist Code: C160923
  - id: $SDTMIGRS
    operator: get_codelist_attributes
    ct_attribute: Term Signification
    ct_conditions:
      - Codelist Code: C160924
  - id: $fda_standards
    operator: distinct
    domain: fda_submission_standards
    name: property_version
Outcome:
  Message: SDTM IG Version or SDTM Version do not match a value in the CDISC Controlled Terminology or do not exist in the FDA Data Standards Catalog.
  Output Variables:
    - TSPARMCD
    - TSVAL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record