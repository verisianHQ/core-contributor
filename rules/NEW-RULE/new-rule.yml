# Variable: TSPARMCD
# Condition: 
# Rule: The count of occurrences of TSPARAMCD = <value> not in the set (‘FCNTRY’, ‘OBJPRIM’, ‘OBJSEC’, ‘OUTMSPRI’, ‘OUTMSSEC', ‘REGID’, ‘TITLE’, ‘TTYPE’) included in the list of TSPARAMCD with TSVAL populated is eq 1.
Authorities:
  - Organization: 'FDA'
    Standards:
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1114'
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1114'
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'TCG, Appendix B'
                Document: 'FDA'
                Section: 'FDAB011'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB1114'
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: TSPARMCD
      operator: is_not_contained_by
      value: 
        - FCNTRY
        - OBJPRIM
        - OBJSEC
        - OUTMSPRI
        - OUTMSSEC
        - RANDQT
        - REGID
        - TITLE
        - TTYPE
    - name: TSVAL
      operator: non_empty
    - name: TSPARMCD
      operator: is_not_unique_set
Core:
  Id: NEW-RULE
  Status: Draft
  Version: '1'
Description: The count of occurrences of TSPARAMCD = <value> not in the set
  ('FCNTRY', 'OBJPRIM', 'OBJSEC', 'OUTMSPRI', 'OUTMSSEC', 'REGID',
  'TITLE', 'TTYPE') included in the list of TSPARAMCD with TSVAL populated is eq
  1.
Executability: Fully Executable
Outcome:
  Message: No occurrence of TSPARAMCD='CURTRT' is included in TS or TSVAL is
    null.The count of occurrences of TSPARAMCD = <value> not in the set
    ('FCNTRY', 'OBJPRIM', 'OBJSEC', 'OUTMSPRI', 'OUTMSSEC', 'REGID',
    'TITLE', 'TTYPE') included in the list of TSPARAMCD with TSVAL populated is
    gt 1.
  Output Variables:
    - TSPARMCD
    - TSVAL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
