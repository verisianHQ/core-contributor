  Version: '1'
Description: Raise an error when race is collected but at least 'AMERICAN INDIAN OR ALASKA NATIVE', 'ASIAN', 'BLACK OR AFRICAN AMERICAN', 'NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER', and 'WHITE' are not offered options.
Executability: Fully Executable
Outcome:
  Message: RACE is collected but AMERICAN INDIAN OR ALASKA NATIVE, ASIAN, BLACK OR AFRICAN AMERICAN, 'NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER or WHITE  are not offered options as per Define-XML document.
