# Variable: DSDECOD
# Condition: DTHFL = 'Y'
# Rule: Record is not present in DS where DSDECOD = 'DEATH' for the subject
# verified
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0608
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0608
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0608
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: DTHFL
      operator: equal_to
      value: Y
      value_is_literal: true
    - name: DSDECOD
      operator: not_equal_to
      value: DEATH
      value_is_literal: true
Core:
  Id: NEW-RULE
  Status: Draft
  Version: '1'
Description: Raise an error when DTHFL in DM dataset is 'Y' but a record is missing in DS dataset where DSDECOD = 'DEATH'.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: DTHFL in DM dataset is 'Y' but a record is missing in DS dataset where DSDECOD = 'DEATH'.
  Output Variables:
    - DSDECOD
    - DTHFL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - DS
Sensitivity: Record