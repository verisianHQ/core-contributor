Check:
  all:
    - name: EXSTDTC
      operator: non_empty
    - name: EXSTDTC
      operator: date_greater_than
      value: $max_dsstdtc
Core:
  Id: FDA.SDTMIG.FB3402
  Status: Draft
  Version: '1'
Description: Raise an error when Start Date/Time of Treatment (EXSTDTC) is after the Start Date/Time of the latest Disposition Event (DSSTDTC).
Executability: Fully Executable
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $max_dsstdtc
    name: DSSTDTC
    operator: max
Outcome:
  Message: EXSTDTC falls after the latest DSSTDTC.
  Output Variables:
    - EXSTDTC
    - $max_dsstdtc
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EX
Sensitivity: Record
