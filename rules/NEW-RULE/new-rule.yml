    - name: --ENINT
      operator: non_empty
    - any:
        - name: --STINT
          operator: empty
        - name: --STINT
          operator: not_exists
Core:
  Id: FDA.SDTMIG.FB4306
  Status: Draft
  Version: '1'
Description: Raise an error when planned end of assessment interval (--ENINT) is populated and planned start of assessment interval (--STINT) is not populated.
Executability: Fully Executable
Outcome:
  Message: --ENINT is populated, but --STINT is not populated.
  Output Variables:
    - --ENINT
    - --STINT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record