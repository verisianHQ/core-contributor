    - name: define_variable_origin_type
      operator: not_equal_to
      value: Collected
    - name: define_variable_origin_type
      operator: not_equal_to
      value: Assigned
Core:
  Id: CDISC.SDTMIG.CG0097
  Status: Draft
  Version: '1'
Description: Raise an error when CMTRT is not 'Collected' on the CRF or not 'Assigned' as per Define-XML document.
Executability: Fully Executable
Outcome:
  Message: CMTRT is not 'Collected' on CRF or 'Assigned' according to the Define-XML document.
  Output Variables:
    - variable_name
    - define_variable_origin_type
Rule Type: Variable Metadata Check against Define XML
Scope:
