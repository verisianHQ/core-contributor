Check:
  all:
    - name: define_variable_origin_type
      operator: not_equal_to
      value: Collected
    - any:
        - name: variable_name
          operator: equal_to
          value: RACE
        - name: variable_name
          operator: equal_to
          value: ETHNIC
Core:
  Id: FB5501
  Status: Draft
  Version: '1'
Description: Raise an error when RACE or ETHNIC do not have origin 'Collected' in the define-xml.
Executability: Fully Executable
Outcome:
  Message: RACE or ETHNIC do not have origin 'Collected' in the define-xml.
  Output Variables:
    - variable_name
    - define_variable_origin_type
Rule Type: Variable Metadata Check against Define XML
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record