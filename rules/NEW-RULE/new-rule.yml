# Variable: TSPARMCD, TSVAL
# Condition: 
# Rule: TSVAL when TSPARMCD = 'SDTIGVER' matches a value in the CDISC Controlled Terminology SDTMIGRS codelist (C160924) and TSVAL when TSPARMCD = SDTMVER' matches a value in the SDTMVRS codelist (C160923) and both values exist in the FDA Standards Catalog.
# verified
