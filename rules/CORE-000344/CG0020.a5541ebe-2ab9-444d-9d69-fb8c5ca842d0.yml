Check:
  all:
    - name: define_variable_ccode
      operator: is_extensible_codelist_code
    - name: define_variable_ccode
      operator: non_empty
    - name: variable_value
      operator: is_not_substring_of
      value: define_variable_codelist_coded_values
    - name: variable_value
      operator: not_equal_to
      value: MULTIPLE
      value_is_literal: true
Core:
  Id: CORE-000344
  Status: Published
  Version: '1'
Description: Raise an error when the value of a variable associated with
  an extensible codelist is not in the associated codelist or equal to 'MULTIPLE'.
Executability: Fully Executable
Outcome:
  Message: Variable is not equal to any values within the extensible codelist or equal to 'MULTIPLE'.
  Output Variables:
    - variable_value
    - variable_name
    - define_variable_ccode
    - define_variable_codelist_coded_values
Rule Type: Value Check against Define XML Variable
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
