# Variable: RFSTDTC
# Condition: Milestone associated with RFSTDTC is start of treatment and ACTARM not in ('Screen Failure' 'Not Assigned' 'Not Treated')
# Rule: RFSTDTC ^= null
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Required for all randomized subjects.
                Document: IG v3.2
                Item: Specification
                Section: '5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0146
              Version: '1'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: ACTARM
      operator: is_not_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - Not Treated
        - SCREEN FAILURE
        - NOT ASSIGNED
        - NOT TREATED
    - name: RFSTDTC
      operator: empty
Core:
  Id: CORE-000380
  Status: Published
  Version: '1'
Description: Raise an error when RFSTDTC is not populated, but ACTARM 
  is not equal to 'Screen Failure', 'Not Assigned', or 'Not Treated'.
Executability: Fully Executable
Outcome:
  Message: RFSTDTC must be populated when ACTARM is not equal to 
    'Screen Failure', 'Not Assigned', 'Not Treated'.
  Outcome Variables: 
    - RFSTDTC
    - ACTARM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
