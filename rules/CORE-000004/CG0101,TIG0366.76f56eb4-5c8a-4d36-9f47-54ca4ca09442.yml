Check:
  all:
    - name: ECOCCUR
      operator: equal_to
      value: N
      value_is_literal: true
    - name: ECDOSE
      operator: less_than_or_equal_to
      value: 0
    - name: ECDOSE
      operator: non_empty
Core:
  Id: CORE-000004
  Status: Published
  Version: '1'
Description: Raise an error when ECOCCUR is equal to 'N', but ECDOSE is populated and less than or equal to 0.
Executability: Fully Executable
Outcome:
  Message: ECOCCUR is equal to 'N', but ECDOSE is populated and less than or equal to 0.
  Output Variables:
    - ECTRT
    - ECDOSE
    - ECOCCUR
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EC
  Use Case: INDH
Sensitivity: Record
