# Variable: TSVALNF
# Condition: TSPARMCD = 'HLTSUBJI' and TSVAL = 'Y'
# Rule: TSVALNF = 'NA' when TSPARMCD = ’INDIC’
# verified
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1108
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1108
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All trial design data should be submitted as specified in the FDA Study Data Technical Conformance Guide (TCG).
                Document: FDA
                Section: FDAB011
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB1108
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: $HLTSUBJI_Y
      operator: greater_than_or_equal_to
      value: 1
    - name: TSPARMCD
      operator: equal_to
      value: INDIC
    - name: TSVALNF
      operator: not_equal_to
      value: 'NA'
Core:
  Id: CORE-002059
  Status: Published
  Version: '1'
Description: Raise an error when TSVALNF for TSPARMCD = 'INDIC' is not equal to 'NA' when study is a healthy volunteer study (TSPARMCD = 'HLTSUBJI' and TSVAL = 'Y').
Executability: Fully Executable
Operations:
  - filter:
      TSPARMCD: HLTSUBJI
      TSVAL: "Y"
    group:
      - TSGRPID
    id: $HLTSUBJI_Y
    operator: record_count
Outcome:
  Message: TSVALNF for TSPARMCD = 'INDIC' is not equal to 'NA' when TSPARMCD = 'HLTSUBJI' and TSVAL = 'Y'.
  Output Variables:
    - TSGRPID
    - TSPARMCD
    - TSVAL
    - TSVALNF
    - $HLTSUBJI_Y
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
