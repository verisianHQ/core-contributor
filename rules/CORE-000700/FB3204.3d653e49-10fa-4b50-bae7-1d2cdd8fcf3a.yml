Check:
  all:
    - name: --DY
      operator: exists
    - name: --DTC
      operator: not_exists
Core:
  Id: CORE-000700
  Status: Published
  Version: '1'
Description: Raise an error when --DY is present and populated but --DTC is not
  present in the dataset.
Executability: Fully Executable
Outcome:
  Message: --DTC must be included in the dataset when --DY is present and
    populated.
  Output Variables:
    - --DTC
    - --DY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - FINDINGS ABOUT
      - SPECIAL PURPOSE
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
