Check:
  all:
    - name: --DY
      operator: not_exists
    - name: --DTC
      operator: exists
Core:
  Id: CORE-000321
  Status: Published
  Version: '1'
Description: Raise an error when --DTC is present and populated but --DY is not
  present in the dataset.
Executability: Fully Executable
Outcome:
  Message: --DY must be included in the dataset when --DTC is present and
    populated.
  Output Variables:
    - --DY
    - --DTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
