Check:
  any:
    - name: --STRESU
      operator: is_inconsistent_across_dataset
      value: --TESTCD
Core:
  Id: CORE-002094
  Status: Published
  Version: '1'
Description: Raise an error when standard unit (--STRESU) is not consistent per test (--TESTCD) for a given drug or metabolite across pharmacokinetic datasets within a submission. 
Executability: Fully Executable
Outcome:
  Message: Standard unit (--STRESU) is not consistent per test (--TESTCD).
  Output Variables:
    - --TESTCD
    - --STRESU
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - PC
      - PP
Sensitivity: Group
Grouping_Variables:
  - --STRESU
  - --TESTCD