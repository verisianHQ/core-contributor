# Variable: GEN
# Condition: Variable associated with extensible codelist and the use of value 'OTHER' is appropriate to the data being represented
# Rule: Value in associated codelist or 'OTHER'
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Conformance with the SDTMIG Domain Models is minimally indicated
                  by following SDTM-specified controlled terminology and format
                  guidelines for variables, when provided
                Document: IG v3.4
                Section: 3.2.2
              - Cited Guidance: When the CRF includes a list of values for a qualifier field
                  that includes "Other" and the "Other" is supplemented with a
                  "Specify" free text field
                Document: IG v3.4
                Section: 4.2.7.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0021
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: 3.2.2[Conformance with the SDTMIG Domain Models is minimally
                  indicated by following SDTM-specified controlled terminology
                  and format guidelines for variables, when
                  provided]|4.2.7.1[When the CRF includes a list of values for a
                  qualifier field that includes "Other" and the "Other" is
                  supplemented with a "Specify" free text field,]
                Document: IG v3.3
                Section: 3.2.2|4.2.7.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0021
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: 3.2.2[Conformance with the SDTMIG Domain Models is minimally
                  indicated by following SDTM-specified controlled terminology
                  and format guidelines for variables, when
                  provided]|4.1.2.7.1[When the CRF includes a list of values for
                  a qualifier field that includes "Other" and the "Other" is
                  supplemented with a "Specify" free text field,]
                Document: IG v3.2
                Section: 3.2.2|4.1.2.7.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0021
              Version: '1'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: define_variable_ccode
      operator: is_extensible_codelist_code
    - name: define_variable_ccode
      operator: non_empty
    - name: variable_value
      operator: is_not_substring_of
      value: define_variable_codelist_coded_values
    - name: variable_value
      operator: not_equal_to
      value: OTHER
      value_is_literal: true
Core:
  Id: CORE-000345
  Status: Published
  Version: '1'
Description: Raise an error when the value of a variable associated with
  an extensible codelist is not in the associated codelist or equal to 'OTHER'.
Executability: Fully Executable
Outcome:
  Message: Variable is not equal to any values within the extensible codelist or equal to 'OTHER'.
  Output Variables:
    - variable_value
    - variable_name
    - define_variable_ccode
    - define_variable_codelist_coded_values
Rule Type: Value Check against Define XML Variable
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
