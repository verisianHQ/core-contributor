Check:
  all:
    - name: $missing_trial_design_domains
      operator: non_empty
Core:
  Id: CORE-002056
  Status: Published
  Version: '1'
Description: Raise an error when not all trial design model datasets as listed in the corresponding IG are present in the submission.
Executability: Fully Executable
Outcome:
  Message: At least one Trial Design Dataset is missing.
  Output Variables:
    - $missing_trial_design_domains
Rule Type: Record Data
Operations: 
  - operator: standard_domains
    id: $trial_design_domains
    domain_class: "TRIAL DESIGN"
  - operator: dataset_names
    id: $dataset_names
  - operator: minus
    id: $missing_trial_design_domains
    name: $trial_design_domains
    subtract: $dataset_names
    case_sensitive: False
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Study
