      filter_value: PT
Core:
  Id: CORE-002015
  Status: Published
  Version: '1'
Description: Raise an error when --DECOD is completed but is not a valid MedDRA
  preferred TERM.
Executability: Fully Executable
Outcome:
  Message: --DECOD is completed but value is not a valid MedDRA preferred TERM.
  Output Variables:
    - --DECOD
    - --TERM
Rule Type: Record Data
Scope:
