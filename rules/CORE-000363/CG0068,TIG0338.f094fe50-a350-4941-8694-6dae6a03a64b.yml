# Variable: DSSTDTC
# Condition: Multiple informed consents obtained and DSDECOD = 'INFORMED CONSENT OBTAINED'
# Rule: For each subject, earliest DSSTDTC = DM.RFICDTC
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Date/time of informed consent in ISO 8601 character format. This
                  will be the same as the date of informed consent in the
                  Disposition domain, if that protocol milestone is documented.
                Document: IG v3.4
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0068
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Date/time of informed consent in ISO 8601 character format. This
                  will be the same as the date of informed consent in the
                  Disposition domain, if that protocol milestone is documented.
                Document: IG v3.2
                Item: Specification
                Section: '5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0068
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Date/time of informed consent in ISO 8601 character format. This
                  will be the same as the date of informed consent in the
                  Disposition domain, if that protocol milestone is documented.
                Document: IG v3.3
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0068
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: Date/time of informed consent in ISO 8601 character format. This
                  will be the same as the date of informed consent in the
                  Disposition domain, if that protocol milestone is documented.
                Document: TIG 1.0
                Item: Specification
                Section: 2.8.10.4
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0338
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: DSDECOD
      operator: present_on_multiple_rows_within
      within: USUBJID
    - name: DSDECOD
      operator: equal_to
      value: INFORMED CONSENT OBTAINED
    - name: $min_ds_dsstdtc
      operator: not_equal_to
      value: RFICDTC
    - name: $min_ds_dsstdtc
      operator: equal_to
      value: DSSTDTC
Core:
  Id: CORE-000363
  Status: Published
  Version: '1'
Description: Raise an error when DSDECOD is equal to 'INFORMED CONSENT 
  OBTAINED' but the earliest DSSTDTC for each subject is not equal to 
  RFICDTC in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $min_ds_dsstdtc
    name: DSSTDTC
    operator: min_date
Outcome:
  Message: DSDECOD is equal to 'INFORMED CONSENT OBTAINED' but RFICDTC in the 
    DM dataset is not equal to the earliest DSSTDTC. 
  Output Variables:
    - DSDECOD
    - RFICDTC
    - DSSTDTC
    - $min_ds_dsstdtc
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - DS
  Use Case: INDH
Sensitivity: Record
