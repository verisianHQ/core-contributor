# Variable: ACTARM
# Condition: Study does not use multi-stage arm assignments and ACTARM ^= null
# Rule: ACTARM in TA.ARM
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage Arm
                  assignments, must be a value of ARM in the Trial Arms Dataset.
                  If the subject was not assigned to an Arm or followed a course
                  not described by any planned Arm, ACTARM is null and ARMNRS is
                  populated.
                Document: IG v3.4
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0514
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage arm
                  assignments, must be a value of ARMCD in the Trial Arms
                  Dataset. If the subject was not assigned to an arm or followed
                  a course not described by any planned arm, ACTARMCD is null
                  and ARMNRS is populated.
                Document: IG v3.3
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0514
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: With the exception of studies which use multi-stage Arm
                  assignments, must be a value of ARMCD in the Trial Arms
                  Dataset. If the subject was not assigned to an Arm or followed
                  a course not described by any planned Arm, ACTARMCD is null
                  and ARMNRS is populated.
                Document: TIG 1.0
                Item: Specification:ACTARM
                Section: 2.8.10.4
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0609
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: ACTARM
      operator: non_empty
    - name: ACTARM
      operator: is_not_contained_by
      value: $ta_arm
Core:
  Id: CORE-000209
  Status: Published
  Version: '1'
Description: Raise an error when ACTARM value in DM dataset does not match any ARM value in TA dataset.
Executability: Partially Executable - Possible Overreporting
Operations:
  - domain: TA
    id: $ta_arm
    name: ARM
    operator: distinct
Outcome:
  Message: ACTARM value in DM dataset does not match any ARM value in
    TA dataset. This is only acceptable for multi-stage studies with incomplete
    ARM assignments.
  Output Variables:
    - ACTARM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
  Use Case: INDH
Sensitivity: Record
