Check:
  all:
    - name: --BDSYCD
      operator: exists
    - name: --BODSYS
      operator: exists
    - any:
        - name: --BDSYCD
          operator: is_not_unique_relationship
          value: --BODSYS
        - name: --BODSYS
          operator: is_not_unique_relationship
          value: --BDSYCD
Core:
  Id: CORE-000184
  Status: Published
  Version: '1'
Description: Raise an error when --BDSYCD and --BODSYS are present, but
  --BDSYCD and --BODSYS do not have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: --BDSYCD and -BODSYS do not have a one-to-one relationship.
  Output Variables:
    - --BODSYS
    - --BDSYCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - ALL
  Use Case: INDH
Sensitivity: Record
