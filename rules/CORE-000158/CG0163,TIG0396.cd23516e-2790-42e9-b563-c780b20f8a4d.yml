Check:
  any:
    - all:
        - name: RDOMAIN
          operator: non_empty
        - name: RDOMAIN
          operator: not_equal_to
          value: DM
          value_is_literal: true
        - any:
            - name: IDVAR
              operator: empty
            - name: IDVAR
              operator: not_exists
Core:
  Id: CORE-000158
  Status: Published
  Version: '1'
Description: Raise an error when RDOMAIN is populated and is not 
  equal to 'DM' but IDVAR is not populated.
Executability: Fully Executable
Outcome:
  Message: IDVAR must be populated when RDOMAIN is populated and
    is not equal to 'DM'.
  Output Variables:
    - RDOMAIN
    - IDVAR
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - CO
  Use Case: INDH
Sensitivity: Record
