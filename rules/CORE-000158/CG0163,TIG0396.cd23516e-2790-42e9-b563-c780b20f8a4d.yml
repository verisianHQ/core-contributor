    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Identifying variable in the parent dataset that identifies the
                  record(s) to which the comment applies.  Examples AESEQ or
                  CMGRPID. Used only when individual comments are related to
