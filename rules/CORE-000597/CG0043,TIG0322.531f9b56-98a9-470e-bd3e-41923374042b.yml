Check:
  all:
    - any:
      - name: AESMIE
        operator: not_equal_to
        value: Y
        value_is_literal: true
      - name: AESMIE
        operator: not_exists
    - name: AESOSP
      operator: non_empty
Core:
  Id: CORE-000597
  Status: Published
  Version: '1'
Description: Raise an error when there is a record in the SUPPAE dataset where QNAM is equal to 'AESOSP' but no record with AESMIE equal to 'Y' is present in the AE dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: SUPPAE
Outcome:
  Message: QNAM equal to 'AESOSP' is present in the SUPPAE dataset, but no record with AESMIE equal to 'Y' is present in the AE dataset.
  Output Variables:
    - AESOSP
    - AETERM
    - AESMIE
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
  Use Case: INDH
Sensitivity: Record
