# Variable: VISITDY
# Condition: VISITNUM is NOT in TV.VISITNUM
# Rule: VISITDY = null
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: VISITDY must not be populated for unplanned visits, since
                  VISITDY is, by definition, the planned study day of visit, and
                  since the actual study day of an unplanned visit belongs in a
                  --DY variable.
                Document: IG v3.4
                Section: 4.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0225
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: VISITDY must not be populated for unplanned visits, since
                  VISITDY is, by definition, the planned study day of visit, and
                  since the actual study day of an unplanned visit belongs in a
                  --DY variable.
                Document: IG v3.3
                Section: 4.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0225
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: VISITDY must not be populated for unplanned visits, since
                  VISITDY is, by definition, the planned study day of visit, and
                  since the actual study day of an unplanned visit belongs in a
                  --DY variable.
                Document: IG v3.2
                Section: 4.1.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0225
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: VISITDY must not be populated for unplanned visits, since
                  VISITDY is, by definition, the planned study day of visit, and
                  since the actual study day of an unplanned visit belongs in a
                  --DY variable.
                Document: TIG 1.0
                Item: Num 1
                Section: 2.8.7.5
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0438
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: VISITNUM
      operator: is_not_contained_by
      value: $tv_visitnum
    - name: VISITDY
      operator: non_empty
Core:
  Id: CORE-000140
  Status: Published
  Version: '1'
Description: Raise an error when a visit is unplanned (VISITNUM does not match
  a VISITNUM value in TV dataset) but VISITDY is populated.
Executability: Fully Executable
Operations:
  - domain: TV
    id: $tv_visitnum
    name: VISITNUM
    operator: distinct
Outcome:
  Message: VISITNUM does not match any of the VISITNUM values in the TV
    dataset but VISITDY is populated.
  Output Variables:
    - VISIT
    - VISITNUM
    - VISITDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use Case: INDH
Sensitivity: Record
