    - name: TSPARMCD
      operator: is_contained_by
      value:
        - INDIC
        - TDIGRP
      value_is_literal: true
    - name: TSVAL
      operator: is_not_valid_snomed_term_reference
Core:
  Id: CORE-002072
  Status: Published
  Version: '1'
Description: Raise an error when TSVAL for TSPARMCD = 'INDIC' or 'TDIGRP' is not a valid SNOMED CT term.
Executability: Fully Executable
Outcome:
  Message: TSVAL is not a valid term from SNOMED CT.
  Output Variables:
    - TSPARMCD
    - TSVAL
    - TSVALCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
