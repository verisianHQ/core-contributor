Check:
  all:
    - name: --ENDY
      operator: exists
    - name: --ENDTC
      operator: not_exists
Core:
  Id: CORE-000864
  Status: Published
  Version: '1'
Description: Raise an error when --ENDY is present and populated but --ENDTC is
  not present in the dataset.
Executability: Fully Executable
Outcome:
  Message: --ENDTC must be included in the dataset when --ENDY is present and
    populated.
  Output Variables:
    - --ENDTC
    - --ENDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - FINDINGS ABOUT
      - SPECIAL PURPOSE
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
