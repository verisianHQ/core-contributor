# Variable: VISITNUM
# Condition: VISITNUM ^= null and is planned
# Rule: VISITNUM in TV.VISITNUM
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: For planned visits, values of VISIT, VISITNUM, and VISITDY must
                  be those defined in the Trial Visits (TV) dataset (Section
                  7.3.1, Trial Visits).
                Document: SDTMIG v3.4
                Item: ''
                Section: 4.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0033
              Version: '2'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: For planned visits, values of VISIT, VISITNUM, and VISITDY must
                  be those defined in the Trial Visits dataset.
                Document: SDTMIG v3.3
                Item: ''
                Section: 4.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0033
              Version: '2'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: For planned visits, values of VISIT, VISITNUM, and VISITDY must
                  be those defined in the Trial Visits dataset.
                Document: SDTMIG v3.2
                Item: ''
                Section: 4.1.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0033
              Version: '2'
            Version: '2.0'
        Version: '3.2'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: The values of VISITNUM in the TV dataset are the valid values of
                  VISITNUM for planned visits. Any values of VISITNUM that
                  appear in subject-level datasets that are not in the TV
                  dataset are assumed to correspond to unplanned visits. There
                  will be a one-to-one relationship between values of VISIT and
                  VISITNUM in TV. If a subject-level dataset includes both
                  VISITNUM and VISIT, then records that include values of
                  VISITNUM that appear in the TV dataset should also include the
                  corresponding values of VISIT from the TV dataset.
                  Specification VISITDY Planned study day of VISIT.
                Document: TIG 1.0
                Item: Assumption 6 |Specifications VISITDY
                Section: 2.8.10.31
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0314
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: VISITNUM
      operator: non_empty
    - any:
      - name: SVPRESP
        operator: not_exists
      - name: SVPRESP
        operator: equal_to
        value: Y
    - name: VISITNUM
      operator: is_not_contained_by
      value: $TV_VISITNUM
Core:
  Id: CORE-000270
  Status: Published
  Version: '1'
Description: Raise an error when VISITNUM is populated for a planned visit, but VISITNUM value does not match any VISITNUM value in the TV dataset.
  If SVPRESP is not present, all non-missing VISITNUM values are checked against TV.VISITNUM.
Executability: Partially Executable - Possible Overreporting
Match Datasets:
  - Keys:
      - USUBJID
      - VISITNUM
    Name: SV
Operations:
  - domain: TV
    id: $TV_VISITNUM
    name: VISITNUM
    operator: distinct
Outcome:
  Message: VISITNUM value for planned visit does not match any VISITNUM value in the TV dataset.
  Output Variables:
    - VISITNUM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Exclude:
      - TV
  Use Case: INDH
Sensitivity: Record
