# Variable: GEN
# Condition: Variable Core Status = Permissible and data is collected
# Rule: Variable present in dataset and ^= null
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The sponsor does not have the discretion to exclude permissible
                  variables when they contain data.
                Document: IG v3.2
                Section: 4.1.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The sponsor does not have the discretion to exclude permissible
                  variables when they contain data.
                Document: IG v3.3
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: If a study includes a data item that would be represented in a
                  Permissible variable, then that variable must be included in
                  the SDTM dataset, even if null.
                Document: IG v3.4
                Section: 4.1.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0015
              Version: '1'
            Version: '2.0'
        Version: '3.4'
Check:
  all:
    - name: define_variable_name
      operator: non_empty
    - name: library_variable_core
      operator: equal_to
      value: Perm
    - name: define_variable_has_no_data
      operator: empty
    - any:
        - name: variable_name
          operator: not_exists
        - name: variable_is_empty
          operator: equal_to
          value: true
Core:
  Id: CORE-002006
  Status: Published
  Version: '1'
Description: Raise an error when a variable is permissible, data is collected as per define-xml document but variable is not present in the dataset or has no data.
Executability: Fully Executable
Outcome:
  Message: Variable is permissible and data is collected as per define-xml document but variable is not present in the dataset or variable has no data.
  Output Variables:
    - define_variable_name
    - define_variable_has_no_data
    - library_variable_core
    - variable_name
    - variable_is_empty
Rule Type: Variable Metadata Check against Define XML and Library Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record