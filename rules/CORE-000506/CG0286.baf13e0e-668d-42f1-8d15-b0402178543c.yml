# Variable: TSVAL
# Condition: TSPARMCD = SENDTC (Study End Date)
# Rule: TSVAL conforms to ISO 8601 date
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Further information about the parameters is included below in
                  Table 1. TSVAL may have controlled terminology depending on
                  the value of TSPARMCD
                Document: IG v3.2
                Item: Assumption 3
                Section: '7.4'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0286
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Further information about the parameters is included Appendix
                  C1, Trial Summary Codes. TSVAL may have controlled terminology
                  depending on the value of TSPARMCD. Conditions for including
                  parameters are included in Appendix C1, Trial Summary Codes.
                Document: IG v3.3
                Item: Assumption 3
                Section: '7.4'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0286
              Version: '1'
            Version: '2.0'
        Version: '3.3'
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: SENDTC
      value_is_literal: true
    - name: TSVAL
      operator: invalid_date
Core:
  Id: CORE-000506
  Status: Published
  Version: '1'
Description: Raise an error when TSPARMCD is equal to 'SENDTC' but TSVAL 
  is not a valid ISO8601 date.
Executability: Fully Executable
Outcome:
  Message: Study End Date (SENDTC) value in the TS dataset is not 
    populated in ISO 8601 format.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
