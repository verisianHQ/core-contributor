Check:
  any:
    - name: --STDY
      operator: less_than
      value: 0
    - name: --ENDY
      operator: less_than
      value: 0
Core:
  Id: CORE-002055
  Status: Published
  Version: '1'
Description: Raise an error when Study Day of Start of Treatment (--STDY) and/or Study Day of End of Treatment (--ENDY) are negative for exposure treatments.
Executability: Fully Executable
Outcome:
  Message: Negative value of Study Day variable.
  Output Variables:
    - --STDY
    - --ENDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EC
      - EX
Sensitivity: Record